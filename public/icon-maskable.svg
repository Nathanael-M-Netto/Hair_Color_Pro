<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Fundo sólido full-bleed — maskable safe-zone é o círculo central 80% -->
  <rect width="512" height="512" fill="#0E0C0B"/>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#C66A3E"/>
      <stop offset="1" stop-color="#E6CFAF"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#C66A3E" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#C66A3E" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Glow ambient -->
  <circle cx="256" cy="256" r="200" fill="url(#glow)"/>
  <!-- Marca dentro da safe-zone (80% = raio 205) -->
  <circle cx="256" cy="256" r="96" fill="none" stroke="url(#g)" stroke-width="10"/>
  <circle cx="256" cy="256" r="32" fill="url(#g)"/>
</svg>
